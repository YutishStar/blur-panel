<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#ffffff" />
  <title>Analytics — Cracked Hackerhouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ---- /analytics — self-contained dashboard styling, in the house voice ---- */
    .an {
      --gap: clamp(16px, 2vw, 24px);
      max-width: 1100px;
      margin: 0 auto;
      padding: clamp(28px, 5vw, 64px) var(--pad) 96px;
      font-family: var(--sans);
      color: var(--ink);
    }
    .an a { color: inherit; }

    .an__top {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 24px; flex-wrap: wrap;
      padding-bottom: 22px; margin-bottom: 34px;
      border-bottom: 1px solid var(--rule);
    }
    .an__eyebrow {
      font-family: var(--mono); font-size: 11px; letter-spacing: .22em;
      text-transform: uppercase; color: var(--ink-4); display: block; margin-bottom: 10px;
    }
    .an__title {
      font-family: var(--serif); font-weight: 400; line-height: .95;
      font-size: clamp(40px, 7vw, 76px); letter-spacing: -.01em; margin: 0;
    }
    .an__title em { font-style: italic; color: var(--accent); }
    .an__home {
      font-family: var(--mono); font-size: 12px; letter-spacing: .04em;
      text-decoration: none; color: var(--ink-3);
      border: 1px solid var(--rule); border-radius: 999px; padding: 9px 16px;
      transition: border-color .2s, color .2s;
    }
    .an__home:hover { color: var(--ink); border-color: var(--ink-3); }

    .an__controls {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .an__live {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 12px; color: var(--ink-3);
    }
    .an__live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 0 0 var(--accent-soft); animation: anpulse 2s infinite;
    }
    @keyframes anpulse {
      0% { box-shadow: 0 0 0 0 rgba(61,107,78,.45); }
      70% { box-shadow: 0 0 0 9px rgba(61,107,78,0); }
      100% { box-shadow: 0 0 0 0 rgba(61,107,78,0); }
    }
    .an__range { display: flex; gap: 6px; margin-left: auto; }
    .an__range button {
      font-family: var(--mono); font-size: 12px; letter-spacing: .03em;
      background: none; border: 1px solid var(--rule); color: var(--ink-3);
      border-radius: 999px; padding: 7px 14px; cursor: pointer;
      transition: all .18s;
    }
    .an__range button:hover { color: var(--ink); }
    .an__range button[aria-pressed="true"] {
      background: var(--ink); color: #fff; border-color: var(--ink);
    }

    .an__cards {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap);
      margin-bottom: var(--gap);
    }
    .an-card {
      background: var(--paper); border: 1px solid var(--rule-soft);
      border-radius: 16px; padding: 22px 24px;
    }
    .an-card__label {
      font-family: var(--mono); font-size: 11px; letter-spacing: .16em;
      text-transform: uppercase; color: var(--ink-4); margin: 0 0 12px;
    }
    .an-card__num {
      font-family: var(--serif); font-weight: 400; line-height: 1;
      font-size: clamp(38px, 5vw, 56px); letter-spacing: -.01em;
    }
    .an-card__sub { font-family: var(--mono); font-size: 11px; color: var(--ink-3); margin-top: 8px; }

    .an-chart {
      background: var(--paper); border: 1px solid var(--rule-soft);
      border-radius: 16px; padding: 22px 24px 14px; margin-bottom: var(--gap);
    }
    .an-chart h2, .an-panel h2 {
      font-family: var(--mono); font-size: 11px; letter-spacing: .16em;
      text-transform: uppercase; color: var(--ink-4); margin: 0 0 16px; font-weight: 500;
    }
    .an-chart svg { width: 100%; height: 220px; display: block; overflow: visible; }
    .an-chart__axis { font-family: var(--mono); font-size: 10px; fill: var(--ink-4); }

    .an__panels { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }
    .an-panel {
      background: var(--paper); border: 1px solid var(--rule-soft);
      border-radius: 16px; padding: 22px 24px;
    }
    .an-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid var(--rule-soft);
      font-size: 14px;
    }
    .an-row:last-child { border-bottom: 0; }
    .an-row__label {
      flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--ink-2);
    }
    .an-row__bar {
      flex: 0 0 84px; height: 6px; border-radius: 999px; background: var(--rule-soft);
      position: relative; overflow: hidden;
    }
    .an-row__bar i { position: absolute; inset: 0 auto 0 0; background: var(--accent); border-radius: 999px; }
    .an-row__val { flex: 0 0 auto; font-family: var(--mono); font-size: 12px; color: var(--ink); min-width: 44px; text-align: right; }
    .an-row__val span { color: var(--ink-4); }

    .an__note { font-family: var(--mono); font-size: 11px; color: var(--ink-4); margin-top: 28px; text-align: center; }
    .an__empty { font-family: var(--mono); font-size: 12px; color: var(--ink-4); padding: 8px 0; }
    .an__error {
      background: #fff5f5; border: 1px solid #f3c9c9; color: #8a2a2a;
      border-radius: 14px; padding: 20px 24px; font-family: var(--mono); font-size: 13px; line-height: 1.6;
    }
    .an[data-loading="true"] { opacity: .45; transition: opacity .2s; }

    @media (max-width: 760px) {
      .an__cards { grid-template-columns: 1fr; }
      .an__panels { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="page--analytics" style="background:var(--bg)">
  <main class="an" id="an" data-loading="true">
    <div class="an__top">
      <div>
        <span class="an__eyebrow">cracked · live numbers</span>
        <h1 class="an__title">the <em>analytics</em></h1>
      </div>
      <a class="an__home" href="index.html">← back to site</a>
    </div>

    <div class="an__controls">
      <span class="an__live"><span class="an__live-dot"></span><span id="an-live">— online now</span></span>
      <div class="an__range" role="group" aria-label="Time range">
        <button data-range="7d">7 days</button>
        <button data-range="30d" aria-pressed="true">30 days</button>
        <button data-range="90d">90 days</button>
      </div>
    </div>

    <div id="an-body">
      <div class="an__cards">
        <div class="an-card"><p class="an-card__label">visitors</p><div class="an-card__num" id="an-visitors">·</div><div class="an-card__sub">unique people</div></div>
        <div class="an-card"><p class="an-card__label">pageviews</p><div class="an-card__num" id="an-views">·</div><div class="an-card__sub">total loads</div></div>
        <div class="an-card"><p class="an-card__label">sessions</p><div class="an-card__num" id="an-sessions">·</div><div class="an-card__sub">visits</div></div>
      </div>

      <div class="an-chart">
        <h2>visitors over time</h2>
        <svg id="an-svg" viewBox="0 0 100 40" preserveAspectRatio="none"></svg>
      </div>

      <div class="an__panels">
        <div class="an-panel"><h2>top pages</h2><div id="an-pages"></div></div>
        <div class="an-panel"><h2>most clicked</h2><div id="an-clicks"></div></div>
        <div class="an-panel"><h2>where they come from</h2><div id="an-sources"></div></div>
        <div class="an-panel"><h2>custom events</h2><div id="an-events"></div></div>
      </div>
    </div>

    <p class="an__note" id="an-note">—</p>
  </main>

  <script>
    (function () {
      var KEY_STORAGE = "an_key";
      var state = { range: "30d" };
      var $ = function (id) { return document.getElementById(id); };
      var root = $("an");

      function fmt(n) {
        n = Number(n) || 0;
        if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, "") + "m";
        if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, "") + "k";
        return String(n);
      }
      function esc(s) {
        return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }

      function list(el, rows, getLabel, getVal, suffix) {
        if (!rows || !rows.length) { el.innerHTML = '<div class="an__empty">no data yet</div>'; return; }
        var max = Math.max.apply(null, rows.map(getVal)) || 1;
        el.innerHTML = rows.map(function (r) {
          var v = getVal(r), pct = Math.max(4, Math.round((v / max) * 100));
          return '<div class="an-row">' +
            '<span class="an-row__label">' + esc(getLabel(r)) + "</span>" +
            '<span class="an-row__bar"><i style="width:' + pct + '%"></i></span>' +
            '<span class="an-row__val">' + fmt(v) + (suffix ? ' <span>' + suffix + "</span>" : "") + "</span>" +
          "</div>";
        }).join("");
      }

      function chart(daily) {
        var svg = $("an-svg");
        if (!daily || daily.length < 2) {
          svg.innerHTML = '<text x="50" y="20" text-anchor="middle" class="an-chart__axis">not enough data yet</text>';
          return;
        }
        var W = 100, H = 40, pad = 2;
        var vals = daily.map(function (d) { return d.visitors; });
        var max = Math.max.apply(null, vals) || 1;
        var n = daily.length;
        var x = function (i) { return pad + (i / (n - 1)) * (W - pad * 2); };
        var y = function (v) { return H - pad - (v / max) * (H - pad * 2); };
        var line = daily.map(function (d, i) { return (i ? "L" : "M") + x(i).toFixed(2) + " " + y(d.visitors).toFixed(2); }).join(" ");
        var area = line + " L" + x(n - 1).toFixed(2) + " " + (H - pad) + " L" + x(0).toFixed(2) + " " + (H - pad) + " Z";
        var first = daily[0].day ? String(daily[0].day).slice(5, 10) : "";
        var last = daily[n - 1].day ? String(daily[n - 1].day).slice(5, 10) : "";
        svg.innerHTML =
          '<defs><linearGradient id="ang" x1="0" y1="0" x2="0" y2="1">' +
          '<stop offset="0" stop-color="#3d6b4e" stop-opacity="0.20"/>' +
          '<stop offset="1" stop-color="#3d6b4e" stop-opacity="0"/></linearGradient></defs>' +
          '<path d="' + area + '" fill="url(#ang)"/>' +
          '<path d="' + line + '" fill="none" stroke="#3d6b4e" stroke-width="0.7" vector-effect="non-scaling-stroke"/>' +
          '<text x="' + pad + '" y="' + (H - 0.2) + '" class="an-chart__axis">' + first + "</text>" +
          '<text x="' + (W - pad) + '" y="' + (H - 0.2) + '" text-anchor="end" class="an-chart__axis">' + last + "</text>";
      }

      function render(d) {
        $("an-visitors").textContent = fmt(d.summary.visitors);
        $("an-views").textContent = fmt(d.summary.pageviews);
        $("an-sessions").textContent = fmt(d.summary.sessions);
        $("an-live").textContent = fmt(d.live) + " online now";
        chart(d.daily);
        list($("an-pages"), d.pages, function (r) { return r.path; }, function (r) { return r.views; });
        list($("an-clicks"), d.clicks, function (r) { return r.label; }, function (r) { return r.count; });
        list($("an-sources"), d.sources, function (r) { return r.source; }, function (r) { return r.views; });
        list($("an-events"), d.events, function (r) { return r.event; }, function (r) { return r.count; });
        var when = new Date(d.generatedAt);
        $("an-note").textContent = "updated " + when.toLocaleTimeString() + " · cached up to 2 min · project “Cracked”";
      }

      function showError(msg) {
        $("an-body").innerHTML = '<div class="an__error">' + esc(msg) + "</div>";
      }

      function load() {
        root.setAttribute("data-loading", "true");
        var url = "/api/analytics?range=" + encodeURIComponent(state.range);
        var stored = localStorage.getItem(KEY_STORAGE);
        var headers = stored ? { "x-analytics-key": stored } : {};
        fetch(url, { headers: headers })
          .then(function (r) {
            if (r.status === 401) {
              var k = prompt("Dashboard password:");
              if (k) { localStorage.setItem(KEY_STORAGE, k); load(); }
              throw new Error("auth");
            }
            return r.json().then(function (j) {
              if (!r.ok) throw new Error(j.error || ("HTTP " + r.status));
              return j;
            });
          })
          .then(function (d) { render(d); root.setAttribute("data-loading", "false"); })
          .catch(function (e) {
            root.setAttribute("data-loading", "false");
            if (e.message === "auth") return;
            showError(
              "Couldn't load analytics: " + e.message +
              "\n\nIf this says the key isn't set, add POSTHOG_PERSONAL_API_KEY in your Vercel project's Environment Variables and redeploy."
            );
          });
      }

      Array.prototype.forEach.call(document.querySelectorAll(".an__range button"), function (btn) {
        btn.addEventListener("click", function () {
          state.range = btn.getAttribute("data-range");
          Array.prototype.forEach.call(document.querySelectorAll(".an__range button"), function (b) {
            b.setAttribute("aria-pressed", b === btn ? "true" : "false");
          });
          load();
        });
      });

      load();
      setInterval(load, 60000); // refresh every minute
    })();
  </script>
</body>
</html>
